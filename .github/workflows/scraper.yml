name: COOPAC Online Scraper

on:
  schedule:
    - cron: '0 5 * * *' # Se ejecuta solo todas las madrugadas
  workflow_dispatch: # Te permite activarlo manualmente con un clic

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Extractor Ligero
        run: pip install cloudscraper

      - name: Ejecutar Investigador Autónomo
        run: python scrape_cloud.py

      - name: Guardar y Publicar Datos en la Red
        run: |
          git config --global user.name "Cloud Robot"
          git config --global user.email "robot@github.com"
          git add tasas.json
          git commit -m "Actualización autónoma sin Playwright" || exit 0
          git push
