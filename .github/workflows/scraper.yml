name: COOPAC Online Scraper

on:
  schedule:
    - cron: '0 5 * * *' # Se ejecuta de forma autónoma todas las madrugadas
  workflow_dispatch: # Permite ejecución manual inmediata con un clic

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Librerías de Extracción Avanzada
        run: pip install cloudscraper beautifulsoup4 lxml

      - name: Ejecutar Investigador Integral Multiestrategia
        run: python scrape_cloud.py

      - name: Guardar y Publicar Datos en la Red
        run: |
          git config --global user.name "Cloud Robot"
          git config --global user.email "robot@github.com"
          git add tasas.json
          git commit -m "Solución integral de extracción estructural" || exit 0
          git push
